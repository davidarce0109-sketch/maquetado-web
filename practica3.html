<!DOCTYPE html> <!-- Indica que el documento es HTML5 -->
<html lang="es"> <!-- Etiqueta raíz del documento, idioma español -->

<head>
    <!-- Contiene información sobre la página (no visible directamente) -->

    <meta charset="UTF-8"> <!-- Permite usar caracteres como tildes y ñ -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página se adapte a dispositivos móviles -->

    <title>Mi primera página</title>
    <!-- Título que aparece en la pestaña del navegador -->
</head>

<body>
    <!-- Aquí va todo el contenido visible -->

    <h1>Título principal o primer orden</h1>
    <!-- Encabezado más importante (solo uno por página) -->

    <h2>Título de segundo orden</h2>
    <!-- Subtítulo -->

    <h3>Título de tercer orden</h3>
    <!-- Sub-subtítulo -->

    <h4>Título de cuarto orden</h4>
    <!-- Nivel más específico -->

    <h5>Título de quinto orden</h5>
    <!-- Nivel aún más específico -->

    <h6>Título de sexto orden</h6>
    <!-- Encabezado menos importante -->

</body>
</html>
