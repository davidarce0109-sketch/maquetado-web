<!DOCTYPE html> <!-- Indica al navegador que el documento está escrito en HTML5. Es importante porque le dice al navegador cómo interpretar el contenido. -->

<html lang="en"> <!-- Es la etiqueta raíz que contiene todo el documento HTML. El atributo lang="en" indica que el idioma principal es inglés (puedes cambiarlo a "es" para español). -->

<head> <!-- Contiene información no visible directamente en la página.
    Aquí van configuraciones, enlaces a estilos, scripts, etc. -->

    <meta charset="UTF-8"> <!-- Define la codificación de caracteres.
    UTF-8 permite usar tildes, ñ, emojis, etc. sin problemas. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la página sea responsive (adaptable a móviles).
    Ajusta el ancho al tamaño de la pantalla del dispositivo. -->

    <title>Document</title> <!-- Define el título de la página. 
    Es lo que aparece en la pestaña del navegador. -->

</head>
<body> 
    
    <!-- Aquí va todo el contenido visible: texto, imágenes,    botones, etc. -->
     
</body>
</html> <!-- Son las etiquetas de cierre. Indican dónde termina cada elemento. -->
