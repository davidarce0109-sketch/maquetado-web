<!DOCTYPE html> <!-- Indica al navegador que este documento es HTML5 -->

<html lang="en"> <!-- Etiqueta principal (raíz) de la página. "en" indica idioma inglés -->

<head>
    <!-- Contiene metadatos (información sobre la página, no visible directamente) -->

    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres (permite usar tildes, ñ, etc.) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive (se adapte a celulares y tablets) -->

    <title>Document</title>
    <!-- Título que aparece en la pestaña del navegador -->
</head>

<body>
    <!-- Contenido visible de la página -->

    <ul>
        <!-- Lista desordenada (con viñetas/puntos) -->

        <li>elemento 1</li>
        <!-- Cada <li> es un elemento de la lista -->

        <li>elemento 2</li>
        <!-- Otro elemento de la lista -->

        <li>elemento 3</li>
        <!-- Otro elemento de la lista -->

    </ul>
    <!-- Fin de la lista -->

</body>

</html>
<!-- Fin del documento HTML -->
